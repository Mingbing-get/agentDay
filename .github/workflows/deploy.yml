name: CI and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  ci:
    name: Test and Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.2.0
        with:
          version: 10.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build application
        env:
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
        run: pnpm build

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Prepare remote directory
        uses: appleboy/ssh-action@v1.2.4
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          script_stop: true
          envs: DEPLOY_PATH
          script: |
            set -eu
            mkdir -p "$DEPLOY_PATH" || {
              echo "Cannot create DEPLOY_PATH. Ensure the SSH user has write permission to $DEPLOY_PATH."
              exit 1
            }
            touch "$DEPLOY_PATH/.deploy-write-test" || {
              echo "DEPLOY_PATH is not writable by the SSH user. Fix ownership or choose a writable DEPLOY_PATH."
              exit 1
            }
            rm -f "$DEPLOY_PATH/.deploy-write-test"
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}

      - name: Sync application files
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          overwrite: true
          strip_components: 0
          target: ${{ secrets.DEPLOY_PATH }}
          source: ".dockerignore,Dockerfile,docker-compose.yml,next-env.d.ts,next.config.ts,package.json,pnpm-lock.yaml,tsconfig.json,vitest.config.ts,vitest.setup.ts,src,scripts,prisma/schema.prisma,.github/workflows/deploy.yml"

      - name: Restart application on server
        uses: appleboy/ssh-action@v1.2.4
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          APP_PORT: ${{ secrets.APP_PORT }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          script_stop: true
          envs: DEPLOY_PATH,APP_PORT,NEXT_PUBLIC_SITE_URL
          script: |
            set -eu
            cd "$DEPLOY_PATH"
            sh scripts/remote-deploy.sh
