services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent-day-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: file:./dev.db
    volumes:
      - ./generated:/app/generated
      - ./prisma:/app/prisma
